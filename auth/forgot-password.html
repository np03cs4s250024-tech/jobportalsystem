<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - JSTACK</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
    <h2>JSTACK</h2>
    <a href="login.html">← Back to Login</a>
</header>

<div class="form-container">
    <div class="form-box">
        <h2>Reset Password</h2>
        <div id="alert-box"></div>

        <form id="step-request" onsubmit="handleForgotPasswordRequest(event)">
            <p style="color:#888;font-size:14px;margin-bottom:20px;">
                Enter your registered email to receive a verification code.
            </p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <button type="submit" id="send-otp-btn" style="width:100%;margin-top:10px;">
                Send Reset Code
            </button>
        </form>

        <form id="step-reset" onsubmit="handlePasswordResetFinal(event)" style="display:none;">
            <p style="color:#888;font-size:14px;margin-bottom:20px;">
                Enter the code sent to your email and your new password.
            </p>
            <div class="input-group">
                <label>Verification Code</label>
                <input type="text" id="otp" placeholder="6-digit code" required maxlength="6">
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newpass" placeholder="Min 6 characters" 
                       required minlength="6" autocomplete="new-password">
            </div>
            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirm" placeholder="Re-enter new password" 
                       required autocomplete="new-password">
            </div>
            <button type="submit" id="reset-btn" style="width:100%;margin-top:10px;">
                Update Password
            </button>
        </form>
    </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
