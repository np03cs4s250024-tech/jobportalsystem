<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JSTACK</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Small helper for the loading state we use in auth.js */
        .spinner-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header class="navbar">
    <h2>JSTACK</h2>
    <a href="../index.html" style="color:white; text-decoration:none; font-size:14px;">← Back to Home</a>
</header>

<div class="form-container">
    <div class="form-box">
        <h2 style="margin-bottom: 5px;">Welcome Back</h2>
        <p style="color:#888; font-size:14px; margin-bottom:25px;">Sign in to continue to JSTACK</p>
        
        <div id="alert-box"></div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" 
                       id="email" 
                       placeholder="you@example.com" 
                       required 
                       autocomplete="username">
            </div>
            
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="password">Password</label>
                    <a href="forgot-password.html" style="font-size: 12px; color: #0a66c2; text-decoration: none; margin-bottom: 5px;">Forgot?</a>
                </div>
                <input type="password" 
                       id="password" 
                       placeholder="••••••••" 
                       required 
                       autocomplete="current-password">
            </div>

            <button type="submit" id="login-btn" class="btn-primary" style="width:100%; margin-top:15px; padding: 12px;">
                Login
            </button>
        </form>

        <div style="margin-top:25px; font-size:14px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            Don't have an account? <a href="register.html" style="color:#0a66c2; font-weight: bold; text-decoration: none;">Register here</a>
        </div>
    </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
